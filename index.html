<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA System Pro</title>
    
    <!-- 💡 클라우드 동기화를 위한 Firebase 통신망 스크립트 3종 (Auth 누락 복구 완결) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="./Core.css">
    
    <script src="./constants.js"></script>
    <script src="./loader.js"></script>
</head>
<body>

    <a href="#main-content" class="skip-nav">본문 영역으로 즉시 건너뛰기</a>

    <header>
        <div class="header-left">
            <h1>QA System Pro</h1>
        </div>
        <div class="header-right">
            <button class="btn-cal-nav" id="quick-kpi-btn" style="display:flex; align-items:center; gap:4px; font-weight:bold; background:#fff;" onclick="window.QA_CORE.Router.switchTab('kpi')">📊 KPI</button>
            <button class="btn-settings-trigger" id="open-settings-btn" aria-label="환경 설정 열기">⚙️</button>
        </div>
    </header>

    <nav class="nav-tabs" id="draggable-tabs-container" aria-label="시스템 메인 메뉴">
        <button id="tab-btn-issue" class="tab-btn active" draggable="true" aria-selected="true" role="tab" onclick="window.QA_CORE.Router.switchTab('issue')">이슈 작성</button>
        <button id="tab-btn-calendar" class="tab-btn" draggable="true" aria-selected="false" role="tab" onclick="window.QA_CORE.Router.switchTab('calendar')">일정 관리</button>
        <button id="tab-btn-bookmark" class="tab-btn" draggable="true" aria-selected="false" role="tab" onclick="window.QA_CORE.Router.switchTab('bookmark')">북마크</button>
        <button id="tab-btn-tc" class="tab-btn" draggable="true" aria-selected="false" role="tab" onclick="window.QA_CORE.Router.switchTab('tc')">TC 작성</button>
        <button id="tab-btn-kpi" class="tab-btn" draggable="true" aria-selected="false" role="tab" onclick="window.QA_CORE.Router.switchTab('kpi')">개인 KPI 관리</button>
        <button id="tab-btn-template" class="tab-btn" draggable="true" aria-selected="false" role="tab" onclick="window.QA_CORE.Router.switchTab('template')">양식 관리</button>
    </nav>

    <main class="main-container" id="main-content">
        <div id="tab-panel-issue" class="content-panel active" role="tabpanel" aria-labelledby="tab-btn-issue"></div>
        <div id="tab-panel-calendar" class="content-panel" role="tabpanel" aria-labelledby="tab-btn-calendar"></div>
        <div id="tab-panel-bookmark" class="content-panel" role="tabpanel" aria-labelledby="tab-btn-bookmark"></div>
        <div id="tab-panel-tc" class="content-panel" role="tabpanel" aria-labelledby="tab-btn-tc"></div>
        <div id="tab-panel-kpi" class="content-panel" role="tabpanel" aria-labelledby="tab-btn-kpi"></div>
        <div id="tab-panel-template" class="content-panel" role="tabpanel" aria-labelledby="tab-btn-template"></div>
    </main>

    <div id="settings-modal" class="modal-overlay d-none" role="dialog" aria-modal="true" aria-labelledby="modal-title"></div>

    <script type="module" src="main.js"></script>
</body>
</html>

<section class="card-panel layout-vertical" aria-labelledby="calendar-month-title">
    <div class="inline-group" style="justify-content: space-between;">
        <h2 id="calendar-month-title" class="color-blue"></h2>
        <div class="calendar-nav-group" role="group" aria-label="달력 월 변경 메뉴">
            <button class="btn-cal-nav" id="cal-prev-btn">◀ 이전달</button>
            <button class="btn-cal-nav" id="cal-today-btn">오늘</button>
            <button class="btn-cal-nav" id="cal-next-btn">다음달 ▶</button>
        </div>
    </div>
    <div class="calendar-grid" id="calendar-grid-dom-zone" aria-live="polite"></div>
</section>
